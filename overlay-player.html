<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .player-overlay {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(8, 8, 18, 0.75);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px 12px;
      -webkit-app-region: no-drag;
      cursor: grab;
      transition: border-color 0.2s, background 0.2s;
      container-type: size;
      overflow: hidden;
    }

    .drag-handle {
      -webkit-app-region: drag;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      pointer-events: none;
    }

    .player-overlay:hover {
      border-color: rgba(255,255,255,0.18);
      background: rgba(8, 8, 28, 0.85);
    }

    .player-name {
      font-size: clamp(9px, 4cqh, 13px);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #e2e8f0;
      letter-spacing: 0.02em;
      max-width: 0;
      opacity: 0;
      transition: max-width 0.3s ease, opacity 0.3s ease;
      z-index: 1;
    }

    .player-name.visible {
      max-width: 200px;
      opacity: 1;
    }

    .player-mmr {
      font-size: clamp(11px, 5cqh, 16px);
      font-weight: 900;
      background: linear-gradient(135deg, #667eea, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      flex-shrink: 0;
      z-index: 1;
    }

    .player-mmr.loading {
      background: none;
      -webkit-text-fill-color: #444;
      animation: shimmer 1.2s infinite;
    }

    @keyframes shimmer {
      0% { opacity: 0.3; }
      50% { opacity: 0.7; }
      100% { opacity: 0.3; }
    }

    @keyframes mmrPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .pop { animation: mmrPop 0.35s ease-out; }
  </style>
</head>
<body>
<div class="player-overlay" id="playerOverlay">
  <div class="drag-handle"></div>
  <div class="player-name" id="playerName">...</div>
  <div class="player-mmr loading" id="playerMMR">···</div>
</div>
<script src="overlay-player-renderer.js"></script>
</body>
</html>
