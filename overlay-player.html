<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: transparent;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .player-overlay {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(13, 17, 23, 0.88);
      border: 1px solid rgba(47,129,247,0.25);
      border-top: 2px solid #2f81f7;
      border-radius: 8px;
      padding: 5px 12px;
      -webkit-app-region: no-drag;
      cursor: grab;
      transition: background 0.2s, border-color 0.2s;
      container-type: size;
      overflow: hidden;
      position: relative;
    }

    .drag-handle {
      -webkit-app-region: drag;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      pointer-events: none;
    }

    .player-overlay:hover {
      background: rgba(13, 17, 30, 0.94);
      border-color: rgba(47,129,247,0.45);
    }

    .player-name {
      font-size: clamp(10px, 4cqh, 15px);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.02em;
      max-width: 0;
      opacity: 0;
      transition: max-width 0.14s ease, opacity 0.14s ease;
      z-index: 1;
    }

    .player-name.visible { max-width: 200px; opacity: 1; }

    .player-mmr {
      font-size: clamp(13px, 5.5cqh, 20px);
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
      z-index: 1;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }

    .player-mmr.loading {
      color: rgba(255,255,255,0.2);
      animation: shimmer 1.4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.7; }
    }

    @keyframes mmrPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .pop { animation: mmrPop 0.18s cubic-bezier(0.34,1.56,0.64,1); }
  </style>
</head>
<body>
<div class="player-overlay" id="playerOverlay">
  <div class="drag-handle"></div>
  <div class="player-name" id="playerName">...</div>
  <div class="player-mmr loading" id="playerMMR">···</div>
</div>
<script src="overlay-player-renderer.js"></script>
</body>
</html>
